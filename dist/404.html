<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — 404 | Romanov Decor Studio</title>
<meta name="description" content="Страница не найдена. Вернитесь на главную или посмотрите наши работы — микроцемент и наливные полы в Минске.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Geologica',sans-serif;background:#2c2c2c;color:#efece7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
.w{max-width:520px}
.code{font-size:120px;font-weight:600;color:#b8965a;line-height:1;margin-bottom:8px}
h1{font-size:24px;font-weight:600;margin-bottom:12px}
p{font-size:15px;color:#a09a92;font-weight:300;line-height:1.7;margin-bottom:24px}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
a{display:inline-block;padding:13px 24px;border-radius:14px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;text-decoration:none;transition:.2s}
.b1{background:#b8965a;color:#1a1a1a}.b1:hover{background:#d4b883}
.b2{background:none;border:1px solid rgba(184,150,90,.25);color:#b8965a}.b2:hover{background:rgba(184,150,90,.06)}
@media(max-width:600px){.code{font-size:80px}h1{font-size:20px}}
</style>
<meta property="og:image" content="https://romanovdecor.by/img/og-cover.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:image" content="https://romanovdecor.by/img/og-cover.jpg">
<style>/* stage1 fixes */
html{overflow-x:clip}
input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid #b8965a;outline-offset:1px}
a:focus-visible,button:focus-visible{outline:2px solid #b8965a;outline-offset:2px}
</style>
</head>
<body>
<div class="w">
<div class="code">404</div>
<h1>Страница не найдена</h1>
<p>Возможно, она была перемещена или вы ошиблись адресом. Вернитесь на главную или посмотрите наши работы.</p>
<div class="btns">
<a href="/" class="b1">На главную</a>
<a href="/portfolio" class="b2">Портфолио</a>
</div>
</div>
<script>
/* stage1: маска телефона + скрытие пустых мессенджеров */
(function(){
  document.querySelectorAll('input[type=tel]').forEach(function(inp){
    inp.setAttribute('autocomplete','tel');
    inp.setAttribute('inputmode','tel');
    inp.setAttribute('pattern','\\+?[0-9\\s()\\-]{7,20}');
    inp.setAttribute('title','Введите номер телефона, например +375 (29) 123-45-67');
    inp.setAttribute('maxlength','20');
    inp.addEventListener('input', function(){
      var v = inp.value.replace(/[^\d+]/g,'').replace(/(?!^)\+/g,'');
      var d = v.replace(/^\+/,'');
      if(/^375\d{0,9}$/.test(d)){
        var p = '+375';
        if(d.length > 3) p += ' (' + d.slice(3,5);
        if(d.length >= 5) p += ')';
        if(d.length > 5) p += ' ' + d.slice(5,8);
        if(d.length > 8) p += '-' + d.slice(8,10);
        if(d.length > 10) p += '-' + d.slice(10,12);
        inp.value = p;
      } else {
        inp.value = v;
      }
    });
  });
  fetch('/api/contacts').then(function(r){return r.json()}).then(function(j){
    var c = j && j.contacts || {};
    if(!c.telegram) document.querySelectorAll('a[href^="https://t.me"]').forEach(function(a){a.style.display='none'});
    if(!c.viber) document.querySelectorAll('a[href^="viber:"]').forEach(function(a){a.style.display='none'});
  }).catch(function(){});
})();
</script>
</body>
</html>
